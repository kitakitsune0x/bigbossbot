services:
  postgres:
    image: postgres:16-alpine
    container_name: big-boss-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: big_boss
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-54329}:5432"
    volumes:
      - big-boss-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d big_boss"]
      interval: 5s
      timeout: 5s
      retries: 20

  intel:
    build:
      context: .
      dockerfile: intel-service/Dockerfile
    container_name: big-boss-intel
    restart: unless-stopped
    environment:
      INTEL_SHARED_SECRET: ${INTEL_SHARED_SECRET:-local-intel-secret}
      INTEL_LOG_LEVEL: ${INTEL_LOG_LEVEL:-INFO}
    ports:
      - "${INTEL_PORT:-8000}:8000"
    expose:
      - "8000"
    volumes:
      - big-boss-intel-data:/app/intel-vendor/backend/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 10

  app:
    image: ${BIG_BOSS_IMAGE:-ghcr.io/kitakitsune0x/bigbossbot:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-}
    container_name: big-boss-app
    restart: unless-stopped
    depends_on:
      intel:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/big_boss
      AUTH_ENCRYPTION_KEY: ${AUTH_ENCRYPTION_KEY:-}
      AUTH_ENCRYPTION_KEY_FALLBACKS: ${AUTH_ENCRYPTION_KEY_FALLBACKS:-}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-big_boss_session}
      AUTH_SESSION_DAYS: ${AUTH_SESSION_DAYS:-30}
      AUTH_REQUIRE_2FA: ${AUTH_REQUIRE_2FA:-false}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-big_boss_admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      INTEL_SERVICE_URL: http://intel:8000
      INTEL_SHARED_SECRET: ${INTEL_SHARED_SECRET:-local-intel-secret}
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3000/login || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  mcp:
    image: ${BIG_BOSS_IMAGE:-ghcr.io/kitakitsune0x/bigbossbot:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-}
    profiles: ["mcp"]
    depends_on:
      app:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/big_boss
      BIG_BOSS_BASE_URL: http://app:3000
      BIG_BOSS_API_TOKEN: ${BIG_BOSS_API_TOKEN:-}
    command: ["npm", "run", "mcp"]
    stdin_open: true
    tty: true
    restart: "no"

volumes:
  big-boss-postgres-data:
  big-boss-intel-data:
