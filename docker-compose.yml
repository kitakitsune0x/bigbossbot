services:
  postgres:
    image: postgres:16-alpine
    container_name: big-boss-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: big_boss
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-54329}:5432"
    volumes:
      - big-boss-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d big_boss"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    image: ${BIG_BOSS_IMAGE:-ghcr.io/kitakitsune0x/bigbossbot:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-}
    container_name: big-boss-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/big_boss
      AUTH_ENCRYPTION_KEY: ${AUTH_ENCRYPTION_KEY:-}
      AUTH_ENCRYPTION_KEY_FALLBACKS: ${AUTH_ENCRYPTION_KEY_FALLBACKS:-}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-big_boss_session}
      AUTH_SESSION_DAYS: ${AUTH_SESSION_DAYS:-30}
      AUTH_REQUIRE_2FA: ${AUTH_REQUIRE_2FA:-false}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-big_boss_admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3000/login || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  mcp:
    image: ${BIG_BOSS_IMAGE:-ghcr.io/kitakitsune0x/bigbossbot:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-}
    profiles: ["mcp"]
    depends_on:
      app:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/big_boss
      BIG_BOSS_BASE_URL: http://app:3000
      BIG_BOSS_API_TOKEN: ${BIG_BOSS_API_TOKEN:-}
    command: ["npm", "run", "mcp"]
    stdin_open: true
    tty: true
    restart: "no"

volumes:
  big-boss-postgres-data:
